<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnix Pro - Ultimate</title>
    <style>
        :root {
            --green: #58cc02; --blue: #1cb0f6; --red: #ff4b4b; --gold: #ffc107; --purple: #ce82ff; --bg: #f0f4f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #app {
            width: 430px; height: 800px; background: white; border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow: hidden; position: relative;
            display: flex; flex-direction: column; border: 8px solid #333;
        }

        .screen { display: none; padding: 25px; flex-direction: column; height: 100%; overflow-y: auto; }
        .active { display: flex; }

        /* Status Bars */
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 15px; border-bottom: 3px solid #eee; background: white; }
        .stat { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .multiplier { color: var(--purple); font-size: 14px; font-weight: bold; }

        /* Buttons & UI */
        .btn {
            padding: 16px; background: var(--blue); color: white; border: none; 
            border-radius: 20px; cursor: pointer; font-weight: bold; margin: 10px 0;
            box-shadow: 0 6px #1899d6; transition: 0.1s; font-size: 16px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-green { background: var(--green); box-shadow: 0 6px #46a302; }
        .btn-gold { background: var(--gold); box-shadow: 0 6px #d39e00; color: #333; }
        .btn-purple { background: var(--purple); box-shadow: 0 6px #a356d4; }

        /* Level Map */
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px 0; }
        .lvl-node { 
            width: 70px; height: 70px; background: #e5e5e5; border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; cursor: pointer; box-shadow: 0 5px #ccc;
        }
        .lvl-node.unlocked { background: var(--green); color: white; box-shadow: 0 5px #46a302; }

        /* Quiz */
        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: #888; }
        .option { 
            background: white; border: 3px solid #e5e5e5; padding: 15px; 
            border-radius: 18px; margin: 8px 0; cursor: pointer; font-weight: 500;
        }
        .option:hover { border-color: var(--blue); background: #f0f8ff; }

        .pet { width: 130px; align-self: center; margin-bottom: 15px; }
        .speech-bubble { 
            background: #fff; border: 3px solid #eee; padding: 15px; 
            border-radius: 20px; position: relative; margin-bottom: 20px; font-size: 15px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="topBar" class="top-bar" style="display:none;">
        <div class="stat">❤️ <span id="h-val">5</span></div>
        <div class="stat">💎 <span id="g-val">0</span></div>
        <div id="multDisplay" class="multiplier"></div>
    </div>

    <div id="nameScreen" class="screen">
        <img src="pet.png" class="pet" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712035.png'">
        <div class="speech-bubble">Salom, do'stim! Ismingni ayt, Python olamiga sayohatni boshlaymiz!</div>
        <input type="text" id="nameInput" placeholder="Ismingiz..." style="padding:15px; border-radius:15px; border:3px solid #eee;">
        <button class="btn" onclick="saveUser()">KIRISH</button>
    </div>

    <div id="dashScreen" class="screen">
        <h3 id="welcomeMsg">Salom!</h3>
        <p>Beginner kursi: 10 ta daraja</p>
        <div class="level-grid" id="levelGrid"></div>
        <button class="btn btn-purple" onclick="showScreen('shopScreen')">DO'KON & BOOSTERS ⚡</button>
        <button class="btn btn-gold" onclick="alert('Learnix v2.0\nMuallif: Baxtibek\nMaqsad: Pythonni qiziqarli o\'rganish!')">INFO ℹ️</button>
    </div>

    <div id="quizScreen" class="screen">
        <div class="q-header">
            <span id="qIdxText">Savol: 1/15</span>
            <span id="timerText"></span>
        </div>
        <h3 id="questionText">...</h3>
        <div id="optionsContainer"></div>
    </div>

    <div id="shopScreen" class="screen">
        <h3>⚡ Super Do'kon</h3>
        <div class="quest-item">Gems: <span id="shopGems">0</span></div>
        <button class="btn btn-purple" onclick="buyBoost()">2X Booster (10 min) - 50 💎</button>
        <button class="btn btn-green" onclick="buyHealth(20, 5)">+5 ❤️ - 20 💎</button>
        <button class="btn btn-green" onclick="buyHealth(50, 11)">+11 ❤️ - 50 💎</button>
        <button class="btn btn-gold" onclick="buyHealth(1000, 25)">+25 ❤️ - 1000 💎</button>
        <button class="btn" onclick="showScreen('dashScreen')">ORQAGA</button>
    </div>
</div>

<script>
    let state = {
        name: "", gems: 0, health: 5, 
        unlockedLevel: 1, multiplier: 1, 
        boostUntil: 0, lessonsDone: 0
    };

    let currentLvl = 1;
    let currentQ = 0;
    const totalQPerLvl = 15;

    window.onload = () => {
        const saved = localStorage.getItem('learnix_pro');
        if(saved) {
            state = JSON.parse(saved);
            updateUI();
            showScreen('dashScreen');
        } else {
            showScreen('nameScreen');
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('topBar').style.display = (id === 'nameScreen') ? 'none' : 'flex';
        if(id === 'dashScreen') renderLevels();
    }

    function saveUser() {
        const n = document.getElementById('nameInput').value;
        if(n) { state.name = n; save(); showScreen('dashScreen'); }
    }

    function renderLevels() {
        const grid = document.getElementById('levelGrid');
        grid.innerHTML = "";
        for(let i=1; i<=10; i++) {
            const div = document.createElement('div');
            div.className = `lvl-node ${i <= state.unlockedLevel ? 'unlocked' : ''}`;
            div.innerText = i;
            div.onclick = () => { if(i <= state.unlockedLevel) startLevel(i); };
            grid.appendChild(div);
        }
        document.getElementById('welcomeMsg').innerText = `Salom, ${state.name}!`;
    }

    function startLevel(l) {
        currentLvl = l;
        currentQ = 0;
        showScreen('quizScreen');
        loadQuestion();
    }

    function loadQuestion() {
        const isBoosted = Date.now() < state.boostUntil;
        document.getElementById('multDisplay').innerText = isBoosted ? "⚡ 2X ACTIVE" : "";
        document.getElementById('qIdxText').innerText = `Savol: ${currentQ + 1} / ${totalQPerLvl}`;
        document.getElementById('questionText').innerText = `Level ${currentLvl}: Python-da mantiqiy savol #${currentQ + 1}`;
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = "";
        ["To'g'ri javob", "Xato javob A", "Xato javob B"].sort(() => Math.random() - 0.5).forEach(opt => {
            const b = document.createElement('div');
            b.className = "option";
            b.innerText = opt;
            b.onclick = () => checkAns(opt === "To'g'ri javob");
            container.appendChild(b);
        });
    }

    function checkAns(isCorrect) {
        if(isCorrect) {
            currentQ++;
            if(currentQ >= totalQPerLvl) finishLevel();
            else loadQuestion();
        } else {
            state.health--;
            if(state.health <= 0) { alert("Quvvat tugadi!"); showScreen('dashScreen'); }
            save();
        }
    }

    function finishLevel() {
        let reward = 3;
        if(Date.now() < state.boostUntil) reward *= 2;
        state.gems += reward;
        if(currentLvl === state.unlockedLevel && state.unlockedLevel < 10) state.unlockedLevel++;
        save();
        alert(`Level tugadi! +${reward} 💎`);
        showScreen('dashScreen');
    }

    function buyBoost() {
        if(state.gems >= 50) {
            state.gems -= 50;
            state.boostUntil = Date.now() + (10 * 60 * 1000);
            save();
            alert("2X Booster yoqildi! 10 daqiqa davom etadi.");
        } else alert("Gems yetarli emas!");
    }

    function buyHealth(p, a) {
        if(state.gems >= p) { state.gems -= p; state.health += a; save(); }
        else alert("Gems yetarli emas!");
    }

    function save() {
        localStorage.setItem('learnix_pro', JSON.stringify(state));
        updateUI();
    }

    function updateUI() {
        document.getElementById('h-val').innerText = state.health;
        document.getElementById('g-val').innerText = state.gems;
        document.getElementById('shopGems').innerText = state.gems;
    }
</script>
</body>
</html>
