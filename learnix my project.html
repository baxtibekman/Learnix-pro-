<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnix - Pro Edition</title>
    <style>
        :root {
            --green: #58cc02; --blue: #1cb0f6; --red: #ff4b4b; --gold: #ffc107; --bg: #f0f4f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #app {
            width: 420px; height: 750px; background: white; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }

        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; overflow-y: auto; }
        .active { display: flex; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid #eee; background: white; sticky; top: 0; }
        .stat { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }

        /* Buttons */
        .btn {
            padding: 15px; background: var(--blue); color: white; border: none; 
            border-radius: 18px; cursor: pointer; font-weight: bold; margin: 8px 0;
            box-shadow: 0 5px #1899d6; transition: 0.2s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-green { background: var(--green); box-shadow: 0 5px #46a302; }
        .btn-gold { background: var(--gold); box-shadow: 0 5px #d39e00; color: #333; }

        /* Sidebar/Quests */
        .quest-item { background: #f9f9f9; padding: 10px; border-radius: 12px; border-left: 5px solid var(--gold); margin: 5px 0; font-size: 14px; }

        /* Quiz */
        .progress-text { font-size: 14px; color: #888; margin-bottom: 10px; }
        .option-btn { background: white; border: 2px solid #e5e5e5; padding: 12px; border-radius: 15px; margin: 5px 0; cursor: pointer; text-align: left; transition: 0.3s; }
        .option-btn:hover { background: #f0f8ff; border-color: var(--blue); }

        .pet { width: 100px; align-self: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="topBar" class="top-bar" style="display:none;">
        <div class="stat">❤️ <span id="h-val">5</span></div>
        <div class="stat">💎 <span id="g-val">0</span></div>
        <div id="userDisplay" style="font-size: 12px; color: #555;"></div>
    </div>

    <div id="nameScreen" class="screen">
        <img src="pet.png" class="pet" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712035.png'">
        <h2>Salom! Men Learnixman.</h2>
        <p>Ismingni yoz, seni eslab qolaman!</p>
        <input type="text" id="nameInput" style="padding:15px; border-radius:15px; border:2px solid #ddd;">
        <button class="btn" onclick="saveUser()">Boshladik!</button>
    </div>

    <div id="levelScreen" class="screen">
        <h3>Darajangizni tanlang:</h3>
        <button class="btn" onclick="setDifficulty('Boshlang\'ich')">Boshlang'ich (Easy)</button>
        <button class="btn btn-green" onclick="setDifficulty('O\'rta')">O'rta (Normal)</button>
        <button class="btn btn-gold" onclick="setDifficulty('Qiyin')">Qiyin (Hard)</button>
    </div>

    <div id="mainScreen" class="screen">
        <div class="quests">
            <h4>Topshiriqlar:</h4>
            <div class="quest-item">5 ta dars: <b>+10 💎</b></div>
        </div>
        <button class="btn btn-green" style="margin-top:20px;" onclick="startLesson()">DARSGA KIRISH</button>
        <button class="btn btn-gold" onclick="showScreen('shopScreen')">DO'KON (SHOP) 🛒</button>
    </div>

    <div id="quizScreen" class="screen">
        <div class="progress-text" id="progressText">Savol: 1 / 15</div>
        <h3 id="qText">Savol shu yerda chiqadi?</h3>
        <div id="options" style="display:flex; flex-direction:column;"></div>
    </div>

    <div id="shopScreen" class="screen">
        <h3>Do'kon</h3>
        <button class="btn" onclick="buyHealth(20, 5)">20 💎 -> 5 ❤️</button>
        <button class="btn" onclick="buyHealth(50, 11)">50 💎 -> 11 ❤️</button>
        <button class="btn btn-gold" onclick="buyHealth(1000, 25)">1000 💎 -> 25 ❤️</button>
        <button class="btn btn-green" onclick="showScreen('mainScreen')">Orqaga</button>
    </div>
</div>

<script>
    let userData = { name: "", gems: 0, health: 5, difficulty: "", lessonsDone: 0 };
    let currentQIdx = 0;
    const totalQuestions = 15;

    // LocalStorage dan yuklash
    window.onload = () => {
        const saved = localStorage.getItem('learnix_user');
        if(saved) {
            userData = JSON.parse(saved);
            updateStats();
            showScreen('mainScreen');
            document.getElementById('topBar').style.display = 'flex';
        } else {
            showScreen('nameScreen');
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveUser() {
        userData.name = document.getElementById('nameInput').value;
        if(userData.name) {
            showScreen('levelScreen');
            document.getElementById('topBar').style.display = 'flex';
        }
    }

    function setDifficulty(diff) {
        userData.difficulty = diff;
        saveData();
        showScreen('mainScreen');
    }

    function startLesson() {
        currentQIdx = 0;
        showScreen('quizScreen');
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('progressText').innerText = `Savol: ${currentQIdx + 1} / ${totalQuestions}`;
        document.getElementById('qText').innerText = `${userData.difficulty} daraja uchun savol: Python-da o'zgaruvchi nima?`;
        const opts = ["Ma'lumot saqlagich", "Ilon turi", "O'yin nomi"];
        const container = document.getElementById('options');
        container.innerHTML = "";
        opts.forEach((o, i) => {
            container.innerHTML += `<div class="option-btn" onclick="checkAns(${i})">${o}</div>`;
        });
    }

    function checkAns(idx) {
        if(idx === 0) {
            if(currentQIdx < totalQuestions - 1) {
                currentQIdx++;
                loadQuestion();
            } else {
                finishLesson();
            }
        } else {
            userData.health--;
            updateStats();
            alert("Xato! ❤️ bittaga kamaydi.");
        }
    }

    function finishLesson() {
        userData.gems += 3; // Hammasini topsa +3 gem
        userData.lessonsDone++;
        if(userData.lessonsDone >= 5) {
            userData.gems += 10;
            userData.lessonsDone = 0;
            alert("Quest bajarildi! +10 💎");
        }
        saveData();
        alert("Dars tugadi! +3 💎 yutdingiz.");
        showScreen('mainScreen');
    }

    function buyHealth(price, amount) {
        if(userData.gems >= price) {
            userData.gems -= price;
            userData.health += amount;
            saveData();
            updateStats();
            alert("Sotib olindi!");
        } else {
            alert("Gemlar yetarli emas!");
        }
    }

    function saveData() {
        localStorage.setItem('learnix_user', JSON.stringify(userData));
        updateStats();
    }

    function updateStats() {
        document.getElementById('g-val').innerText = userData.gems;
        document.getElementById('h-val').innerText = userData.health;
        document.getElementById('userDisplay').innerText = `${userData.name} (${userData.difficulty})`;
    }
</script>

</body>
</html>
